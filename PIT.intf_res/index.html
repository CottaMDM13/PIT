<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Interativo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Cardápio</h1>
        <div id="menu-items" class="menu-items"></div>
        <div class="add-item-form">
            <h2>Adicionar Item</h2>
            <input type="text" id="item-name" placeholder="Nome do item" required>
            <input type="url" id="item-image" placeholder="URL da imagem do item" required>
            <input type="number" id="item-price" placeholder="Preço do item" required>
            <button onclick="addItem()">Adicionar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
